services:
  postgres:
    image: postgres:16
    container_name: db-study-postgres
    restart: unless-stopped
    command: ["postgres", "-c", "max_pred_locks_per_transaction=256"]
    environment:
      POSTGRES_USER: dweb
      POSTGRES_PASSWORD: 1234
      POSTGRES_DB: benchmark
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./schema.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
      - ./insert_data.sql:/docker-entrypoint-initdb.d/02_seed.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dweb -d benchmark"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
